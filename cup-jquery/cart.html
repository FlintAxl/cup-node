<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="p-4">
  <h1>🛒 My Cart</h1>
  <table class="table table-bordered" id="cart-table">
    <thead>
      <tr>
        <th>Item</th>
        <th>Price</th>
        <th>Qty</th>
        <th>Total</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <button class="btn btn-success" onclick="checkout()">Checkout</button>

  <script>
    function renderCart() {
      let cart = JSON.parse(sessionStorage.getItem('cart')) || [];
      const tbody = $('#cart-table tbody');
      tbody.empty();

      if (cart.length === 0) {
        tbody.append('<tr><td colspan="5" class="text-center">Cart is empty.</td></tr>');
        return;
      }

      cart.forEach((item, index) => {
        tbody.append(`
          <tr>
            <td>${item.pname}</td>
            <td>₱${item.price}</td>
            <td>
            <button class="btn btn-sm btn-secondary" onclick="changeQuantity(${index}, -1)">−</button>
            <span class="mx-2">${item.quantity}</span>
            <button class="btn btn-sm btn-secondary" onclick="changeQuantity(${index}, 1)">+</button>
            </td>

            <td>₱${(item.price * item.quantity).toFixed(2)}</td>
            <td><button class="btn btn-sm btn-danger" onclick="removeFromCart(${index})">Remove</button></td>
          </tr>
        `);
      });
    }

    
    $(document).ready(renderCart);
  </script>

  <script src="js/cart.js"></script>
  
</body>
</html>
